services:
    app:
        build: .
        env_file: .env
        ports:
            - '3000:3000'
        restart: unless-stopped
        # note: DATABASE_URL in .env must point at a reachable Postgres.
        # when using the bundled postgres profile (docker compose --profile postgres up),
        # set DATABASE_URL=postgresql://postgres:postgres@postgres:5432/app

    postgres:
        profiles:
            - postgres
        image: postgres:18-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: app
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
