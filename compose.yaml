services:
    app:
        build: .
        env_file: .env
        ports:
            - '3000:3000'
        depends_on:
            postgres:
                condition: service_healthy

    postgres:
        profiles:
            - postgres
        image: postgres:17-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: app
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
